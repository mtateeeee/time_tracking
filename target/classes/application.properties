spring.profiles.active=sqlserver
server.port=8085
spring.application.name=time-tracking

# --- SQL Server Configuration ---
# Lưu ý: Thay 'YourDatabaseName' bằng tên Database bạn đã tạo trong SSMS
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TimeTracking;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Tieuvu1234512345@@
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

