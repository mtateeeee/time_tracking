spring.application.name=time-tracking-sqlserver

# URL kết nối (đã thêm cấu hình bỏ qua xác thực chứng chỉ để tránh lỗi SSL)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TimeTracking;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Mật_Khẩu_Của_Bạn
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Chỉ định rõ Dialect để Hibernate sinh câu lệnh SQL chuẩn cho SQL Server
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect